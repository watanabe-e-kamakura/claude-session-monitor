<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Session Monitor</title>
  <style>
    /* ライトテーマ（Zenn 風：白背景・薄い青アクセント・淡い影） */
    :root {
      --bg: #f5f6f8;       /* 薄グレー背景 */
      --panel: #ffffff;    /* 白カード */
      --panel2: #f0f2f5;
      --input: #f7f8fa;
      --border: #e6e8eb;
      --fg: #1a1d24;       /* 濃いテキスト */
      --fg-dim: #525a63;
      --muted: #8b95a1;
      --accent: #3ea8ff;   /* Zenn ブルー */
      --accent-2: #2f8fe0;
      --working: #1faa59;  /* green */
      --idle: #8b95a1;
      --waiting: #e6492d;  /* red */
      --busy: #1faa59;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 -apple-system, system-ui, "Hiragino Kaku Gothic ProN", sans-serif; background: var(--bg); color: var(--fg); }

    header { padding: 13px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; background: var(--panel); }
    header h1 { font-size: 16px; margin: 0; letter-spacing: .02em; }
    header .stat { color: var(--muted); font-size: 13px; }
    header .spacer { flex: 1; }
    #conn { font-size: 12px; color: var(--muted); }
    .settings-btn { text-decoration: none; font-size: 18px; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; transition: .12s; }
    .settings-btn:hover { border-color: var(--accent); color: var(--accent); }

    .tabs { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 22px 0; background: var(--panel); border-bottom: 1px solid var(--border); }
    .tab { background: transparent; border: 1px solid transparent; border-bottom: 0; border-radius: 8px 8px 0 0; padding: 8px 16px; font: inherit; font-weight: 600; color: var(--muted); cursor: pointer; }
    .tab.active { background: var(--bg); border-color: var(--border); color: var(--accent-2); }
    .ball-badge { background: var(--accent); color: #fff; font-weight: 700; font-size: 11px; padding: 1px 9px; border-radius: 999px; }
    .sess-badge { background: #e6f4ea; color: #1a7f37; border: 1px solid #b7e0c4; font-weight: 700; font-size: 11px; padding: 1px 8px; border-radius: 999px; }
    .pr-pill { font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
    .pr-pill.review_required { background: #eef1f4; color: #65717a; }
    .pr-pill.changes_requested { background: #fdeae6; color: #d23b1f; }
    .pr-pill.approved { background: #e3f7ec; color: #1a8f4c; }
    .pr-pill.draft { background: #eef1f4; color: var(--muted); }
    .ci { font-size: 11px; font-weight: 600; }
    .ci.pass { color: #1a8f4c; } .ci.fail { color: var(--waiting); } .ci.pending { color: #c77700; } .ci.none { color: var(--muted); }
    .launch-bar { padding: 11px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .launch-bar .label { color: var(--muted); font-size: 12px; margin-right: 4px; }
    .preset { background: #eaf4ff; color: #1f7fd0; border: 1px solid #bcddff; border-radius: 7px; padding: 6px 13px; font: inherit; font-weight: 600; cursor: pointer; transition: .12s; }
    .preset:hover { background: #d6ecff; border-color: var(--accent); color: var(--accent-2); }
    .preset:disabled { opacity: .5; cursor: not-allowed; }
    .cwd-input { background: #fff; color: var(--fg); border: 1px solid #cdd4db; border-radius: 7px; padding: 6px 10px; font: inherit; min-width: 300px; }
    .cwd-input:focus { border-color: var(--accent); outline: none; }
    .launch-go { background: var(--accent); color: #fff; font-weight: 700; border: 0; border-radius: 7px; padding: 6px 16px; font: inherit; font-size: 13px; cursor: pointer; transition: .12s; }
    .launch-go:hover { background: var(--accent-2); }
    .launch-go:disabled { opacity: .5; cursor: not-allowed; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; padding: 20px 22px; }
    .empty { color: var(--muted); padding: 40px; grid-column: 1/-1; text-align: center; }
    .group-head { grid-column: 1 / -1; font-size: 12.5px; font-weight: 700; color: var(--fg-dim); margin: 12px 0 0; padding: 8px 2px 2px; border-top: 1px solid var(--border); cursor: pointer; user-select: none; }
    .group-head:first-child { border-top: 0; margin-top: 0; padding-top: 0; }
    .group-head:hover { color: var(--accent-2); }
    .group-toggle { display: flex; align-items: center; gap: 4px; color: var(--muted); font-size: 12px; align-self: flex-end; padding-bottom: 6px; }
    .gbtn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 3px 10px; font: inherit; font-size: 12px; cursor: pointer; }
    .gbtn.active { background: #eaf4ff; border-color: #bcddff; color: var(--accent-2); font-weight: 700; }

    /* カード */
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px 16px; display: flex; flex-direction: column; gap: 9px;
      cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: border-color .12s, transform .12s, box-shadow .12s; }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(62,168,255,.18); }
    .card.waiting { border-color: var(--waiting); box-shadow: 0 0 0 1px var(--waiting) inset; }
    .card.stale { border-color: #e0a030; box-shadow: 0 0 0 1px #e0a030 inset; }
    .stale-badge { background: #fff3e0; color: #c77700; font-weight: 700; padding: 1px 8px; border-radius: 999px; }

    .card .top { display: flex; align-items: center; gap: 9px; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
    .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-pill.working, .status-pill.busy { background: #e3f7ec; color: #1a8f4c; }
    .status-pill.working .dot, .status-pill.busy .dot { background: var(--working); }
    .status-pill.idle { background: #eef1f4; color: #65717a; } .status-pill.idle .dot { background: var(--idle); }
    .status-pill.waiting { background: #fdeae6; color: #d23b1f; } .status-pill.waiting .dot { background: var(--waiting); }
    .status-pill.unknown { background: #eef1f4; color: var(--muted); } .status-pill.unknown .dot { background: var(--border); }

    .card .repo { font-size: 11px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card .kind { font-size: 10px; color: #5a6672; background: #eef1f4; border: 0; border-radius: 4px; padding: 2px 7px; font-weight: 600; }
    .card .kill { background: transparent; border: 0; color: var(--waiting); cursor: pointer; padding: 3px 5px; border-radius: 6px; opacity: .8; display: inline-flex; align-items: center; transition: .12s; }
    .card .kill:hover { opacity: 1; background: #fdeae6; }
    .card .title { font-weight: 700; font-size: 14.5px; line-height: 1.4; color: var(--fg);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card .recent { font-size: 12.5px; color: var(--fg-dim); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; min-height: 64px;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.55; }
    .draftrow { display: flex; }
    .card .meta { display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: 11px; }
    .card .meta b { color: var(--fg); font-weight: 600; }
    .card .footer { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
    .card .sid { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); flex: 1; }
    .card .footer .level { background: #fff; color: var(--fg); border: 1px solid #cdd4db; border-radius: 6px; font-size: 11px; padding: 4px; }
    .tmux-tag { font-family: ui-monospace, monospace; font-size: 10px; color: var(--accent); }

    /* ボタン共通 */
    .jump { background: var(--accent); color: #fff; font-weight: 700; border: 0; border-radius: 7px; padding: 6px 14px; font-family: inherit; font-size: 13px; cursor: pointer; transition: .12s; }
    .jump:hover { background: var(--accent-2); }
    .jump[disabled] { background: #e9edf1; color: #aeb6bf; cursor: not-allowed; font-weight: 600; }
    .ghost { background: #eaf4ff; border: 1px solid #bcddff; color: #1f7fd0; border-radius: 6px; padding: 5px 11px; font: inherit; font-weight: 600; cursor: pointer; transition: .12s; }
    .ghost:hover { background: #d6ecff; border-color: var(--accent); color: var(--accent-2); }

    /* ドラフト状態 */
    .dstate { font-size: 11px; padding: 3px 10px; border-radius: 999px; white-space: nowrap; font-weight: 600; }
    .dstate.gen { background: #eaf4ff; color: var(--accent-2); }
    .dstate.ready { background: #e3f7ec; color: #1a8f4c; }

    /* モーダル */
    .modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,.66); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; width: min(960px, 100%); max-height: 92vh; overflow-y: auto; padding: 22px 26px; cursor: default; box-shadow: 0 24px 70px rgba(0,0,0,.55); }
    .modal-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .modal-head > span { flex: 1; font-weight: 700; font-size: 15px; }
    .modal-head .m-repo { color: var(--muted); font-weight: 600; }
    .modal-head .m-name { cursor: pointer; border-bottom: 1px dashed transparent; }
    .modal-head .m-name:hover { border-bottom-color: var(--accent); color: var(--accent-2); }
    .title-edit { font: inherit; font-weight: 700; font-size: 15px; color: var(--fg); background: #fff; border: 1px solid var(--accent); border-radius: 6px; padding: 3px 8px; width: 60%; }
    #m-close { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 4px 10px; cursor: pointer; }
    #m-close:hover { border-color: var(--accent); color: var(--accent); }
    .m-label { color: #1f7fd0; font-size: 12px; font-weight: 700; letter-spacing: .02em; margin: 16px 0 7px; border-left: 3px solid var(--accent); padding-left: 8px; }
    .m-context { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: ui-monospace, monospace;
      font-size: 12.5px; white-space: pre-wrap; word-break: break-word; max-height: 40vh; overflow-y: auto; line-height: 1.65; color: var(--fg-dim); }
    .draft-text { width: 100%; min-height: 110px; background: var(--bg); color: var(--fg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; font-family: ui-monospace, monospace; font-size: 12.5px; line-height: 1.6; resize: vertical; }
    .draft-actions { display: flex; gap: 8px; margin-top: 8px; }
    .draft-actions .send, #m-draft .send { background: var(--accent); color: #fff; font-weight: 700; border: 0; border-radius: 7px; padding: 8px 16px; font-family: inherit; font-size: 13px; cursor: pointer; transition: .12s; }
    .draft-actions .send:hover, #m-draft .send:hover { background: var(--accent-2); }
    .draft-actions .send[disabled], #m-draft .send[disabled] { opacity: .5; cursor: not-allowed; }
    #m-draft .muted, .m-muted { color: var(--muted); font-size: 12.5px; }
    #m-draft .err { color: var(--waiting); font-size: 12.5px; }
  </style>
</head>
<body>
  <header>
    <h1>🧭 Claude Session Monitor</h1>
    <span class="stat" id="stat">—</span>
    <span class="spacer"></span>
    <span class="stat" id="tmux-hint"></span>
    <span id="conn">● connecting…</span>
    <a class="settings-btn" href="/settings.html" title="設定・人格学習">⚙</a>
  </header>

  <div class="tabs">
    <button class="tab active" id="tab-session">🖥 セッション</button>
    <button class="tab" id="tab-pr">🔀 PR レビュー</button>
    <span style="flex:1"></span>
    <span class="group-toggle">グループ:
      <button class="gbtn active" id="grp-status">状態</button>
      <button class="gbtn" id="grp-repo">リポ</button>
    </span>
  </div>

  <div class="launch-bar">
    <span class="label">+ 新規セッション:</span>
    <input id="custom-cwd" class="cwd-input" placeholder="/path/to/repo" />
    <button id="choose-dir" class="preset" title="Finder でフォルダを選択">📁</button>
    <button id="custom-launch" class="launch-go">▸ 起動</button>
    <span class="label" style="margin-left:10px;">よく使う:</span>
    <span id="presets"></span>
  </div>

  <div class="grid" id="cards">
    <div class="empty">読み込み中…</div>
  </div>

  <div id="modal" class="modal-ov" style="display:none">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <span id="m-title"></span>
        <button id="m-close" title="閉じる">✕</button>
      </div>
      <div class="m-label">直近のやり取り（このセッションが今どこにいるか）</div>
      <div id="m-context" class="m-context"></div>
      <div class="m-label">人格ドラフト返答案（確認・編集して承認）</div>
      <div id="m-draft"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
